<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Sneaker Classifier</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      padding-top: 60px;
    }

    .container {
      background: #1f2937;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      text-align: center;
    }

    input, button {
      margin-top: 15px;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    img {
      margin-top: 20px;
      max-width: 100%;
      border-radius: 12px;
    }

    .result {
      margin-top: 20px;
      background: #374151;
      padding: 15px;
      border-radius: 12px;
    }

    .confidence {
      color: #a7f3d0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>¿Qué zapatilla es?</h1>
    <p>Sube una imagen de una zapatilla y la IA intentará predecir el modelo exacto mediante visión artifical.</p>

    <input type="file" id="imageInput" accept="image/*" />
    <br />
    <button onclick="predictSneaker()">Enviar</button>

    <img id="preview" style="display:none;" />

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const resultDiv = document.getElementById("result");

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];

      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        resultDiv.style.display = "none";
      }
    });

    async function predictSneaker() {
      const file = imageInput.files[0];

      if (!file) {
        alert("Primero selecciona una imagen.");
        return;
      }

      resultDiv.style.display = "block";
      resultDiv.innerHTML = "Analizando imagen...";

      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch("/predict", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        const confidencePercent = (data.confidence * 100).toFixed(2);

        resultDiv.innerHTML = `
          <h2>Resultado</h2>
          <p>Creo que esta zapatilla es:</p>
          <h3>${data.predicted_class}</h3>
          <p class="confidence">Confianza: ${confidencePercent}%</p>
          <hr>
          <p><strong>Top 3 predicciones:</strong></p>
          <ol>
            ${data.top_predictions.map(pred => `
              <li>${pred.class} — ${(pred.confidence * 100).toFixed(2)}%</li>
            `).join("")}
          </ol>
        `;
      } catch (error) {
        resultDiv.innerHTML = "Hubo un error procesando la imagen.";
      }
    }
  </script>
</body>
</html>
