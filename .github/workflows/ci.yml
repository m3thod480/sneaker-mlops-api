name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      S3_MODEL_KEY: models/sneaker_classifier.keras
      AWS_DEFAULT_REGION: eu-west-1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t sneaker-mlops-api .

      - name: Tag Docker image
        run: |
          docker tag sneaker-mlops-api:latest 810498828675.dkr.ecr.eu-west-1.amazonaws.com/sneaker-mlops-api:latest
          docker tag sneaker-mlops-api:latest 810498828675.dkr.ecr.eu-west-1.amazonaws.com/sneaker-mlops-api:${{ github.sha }}

      - name: Push Docker image to ECR
        run: |
          docker push 810498828675.dkr.ecr.eu-west-1.amazonaws.com/sneaker-mlops-api:latest
          docker push 810498828675.dkr.ecr.eu-west-1.amazonaws.com/sneaker-mlops-api:${{ github.sha }}